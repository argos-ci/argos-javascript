  </head>
  <body>
    <main>
      <h1>Animated GIF page</h1>
      <!-- 2-frame animated GIF: frame 0 is red, frame 1 is lime, looping. -->
      <img
        id="gif"
        width="100"

      />

      <!-- Same animated GIF, but served from an extension-less URL so the src
           heuristics can't detect it. Opted in explicitly with
           `data-image-type="gif"`. -->
      <img
        id="masked-gif"
        width="100"
        height="100"
        data-image-type="gif"
        src="masked-gif-endpoint"
      />
    </main>
  </body>
</html>
