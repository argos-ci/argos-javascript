<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Aria snapshot page</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      .yellow-background {
        background-color: yellow;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Aria snapshot page</h1>

      <section id="transparent-section">
        <h2>Transparent</h2>
        <div data-visual-test="transparent" class="yellow-background">
          This div has `data-visual-test="transparent"` attribute.
        </div>
      </section>

      <p>Some text content captured in the ARIA snapshot.</p>
    </main>
  </body>
</html>
