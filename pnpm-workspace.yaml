packages:
  - packages/*

catalog:
  '@types/node': ^22.19.21
  vitest: ^4.1.9

allowBuilds:
  '@swc/core': true
  chromedriver: true
  cypress: true
  edgedriver: true
  esbuild: true
  geckodriver: true
  msw: true
  nx: true
  puppeteer: true
  sharp: true
  unrs-resolver: true

overrides:
  axios: ^1.16.0
  esbuild: ^0.25.10
  form-data: ^4.0.6
  follow-redirects: ^1.16.0
  serialize-javascript: ^7.0.3
  tar: ^7.5.16
  tmp: ^0.2.7
  undici: ^8.5.0
  vite: ^7.3.5

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - "@argos-ci/*"
