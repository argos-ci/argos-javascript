  esbuild: ^0.25.10
  follow-redirects: ^1.16.0
  serialize-javascript: ^7.0.3
  undici: 8.1.0
  vite: ^7.3.2

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - "@argos-ci/*"
