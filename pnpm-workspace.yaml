packages:
  - packages/*

catalog:
  '@types/node': ^20.19.40
  vitest: ^4.1.5

allowBuilds:
  '@swc/core': true
  chromedriver: true
  cypress: true
  edgedriver: true
  esbuild: true
  geckodriver: true
  msw: true
  nx: true
  puppeteer: true
  sharp: true
  unrs-resolver: true

overrides:
